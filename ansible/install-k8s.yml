# =========================
# COMMON SETUP (ALL NODES)
# =========================
- hosts: all
  become: yes

  tasks:

    # Disable swap (REQUIRED)
    - name: Disable swap
      shell: |
        swapoff -a
        sed -i '/ swap / s/^/#/' /etc/fstab
    - name: Remove curl-minimal (fix conflict)
      yum:
       name: curl-minimal
       state: absent

    - name: Install full curl
      yum:
       name: curl
       state: present
    

    # -----------------------------
    # Install dependencies
    # -----------------------------
    - name: Install dependencies
      yum:
        name:
          - curl
          - yum-utils
          - device-mapper-persistent-data
          - lvm2
        state: present
    - name: Install containerd
      yum:
       name: containerd
       state: present

    - name: Create containerd config
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml

    - name: Enable SystemdCgroup
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart containerd
      systemd:
         name: containerd
         state: restarted
         enabled: yes
   
    # -----------------------------
    # Disable SELinux (IMPORTANT)
    # -----------------------------
    - name: Disable SELinux
      selinux:
        state: disabled

    # -----------------------------
    # Enable kernel modules
    # -----------------------------
    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Ensure module loads on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter

    # -----------------------------
    # Sysctl settings
    # -----------------------------
    - name: Configure sysctl
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl
      command: sysctl --system

    # -----------------------------
    # Add Kubernetes repo
    # -----------------------------
    - name: Add Kubernetes repo
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/v1.28/rpm/
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/v1.28/rpm/repodata/repomd.xml.key

    # -----------------------------
    # Install Kubernetes components
    # -----------------------------
    - name: Install kubelet, kubeadm, kubectl
      yum:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: yes
        state: started


# =========================
# MASTER NODE SETUP
# =========================
- hosts: k8s_master
  become: yes

  tasks:

    # Initialize cluster
    - name: Initialize Kubernetes Master
      shell: kubeadm init --pod-network-cidr=192.168.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf

    # Setup kubeconfig
    - name: Create kube directory
      file:
        path: /home/ec2-user/.kube
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Copy kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ec2-user/.kube/config
        remote_src: yes
        owner: ec2-user
        group: ec2-user

    # Wait for cluster
    - name: Wait for Kubernetes API
      become_user: ec2-user
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config
      shell: |
        until kubectl get nodes; do sleep 10; done

    # Install Calico
    - name: Install Calico network
      become_user: ec2-user
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config
      shell: |
        kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml

    # Get join command
    - name: Get join command
      shell: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command
      set_fact:
        kube_join_command: "{{ join_command.stdout }}"


# =========================
# WORKER NODE JOIN
# =========================
- hosts: k8s_workers
  become: yes

  tasks:

    - name: Join Kubernetes cluster
      shell: "{{ hostvars[groups['k8s_master'][0]].kube_join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf
