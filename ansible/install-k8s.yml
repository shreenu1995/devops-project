# =========================
# COMMON SETUP (ALL NODES)
# =========================
- hosts: all
  become: yes

  tasks:

    # Disable swap (REQUIRED for Kubernetes)
    - name: Disable swap
      shell: |
        swapoff -a
        sed -i '/ swap / s/^/#/' /etc/fstab

    # -----------------------------
    # Install Docker
    # -----------------------------
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Enable Docker
      systemd:
        name: docker
        enabled: yes
        state: started
        # -----------------------------
    # Enable kernel modules
    # -----------------------------
    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Ensure br_netfilter loads on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter

    # -----------------------------
    # Set sysctl params
    # -----------------------------
    - name: Configure sysctl for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      command: sysctl --system

    # -----------------------------
    # Install required dependencies
    # -----------------------------
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present

    # -----------------------------
    # Add Kubernetes GPG key
    # -----------------------------
    - name: Add Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | \
        gpg --yes --dearmor -o /usr/share/keyrings/kubernetes-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/kubernetes-archive-keyring.gpg

    # -----------------------------
    # Add Kubernetes repository
    # -----------------------------
    - name: Add Kubernetes repo
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /

    # -----------------------------
    # Update apt
    # -----------------------------
    - name: Update apt cache
      apt:
        update_cache: yes

    # -----------------------------
    # Install Kubernetes components
    # -----------------------------
    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    # -----------------------------
    # Hold packages
    # -----------------------------
    - name: Hold Kubernetes packages
      shell: apt-mark hold kubelet kubeadm kubectl


# =========================
# MASTER NODE SETUP
# =========================
- hosts: k8s_master
  become: yes

  tasks:

    # Initialize cluster
    - name: Initialize Kubernetes Master
      shell: kubeadm init --pod-network-cidr=192.168.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf

    # Setup kubeconfig
    - name: Create kube directory
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Copy kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu

    - name: Wait for Kubernetes API
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      shell: |
        until kubectl get nodes; do sleep 10; done
    # Install network plugin
    - name: Install Calico network
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      shell: |
        kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml

    # Generate join command
    #- name: Get join command
    #  shell: kubeadm token create --print-join-command
    #  register: join_command

        #- name: Save join command
        #copy:
        #content: "{{ join_command.stdout }}"
        #dest: /tmp/join-command.sh
      - name: Get join command
        shell: kubeadm token create --print-join-command
        register: join_command

      - name: Set join command fact
        set_fact:
        kube_join_command: "{{ join_command.stdout }}"


# =========================
# WORKER NODE JOIN
# =========================
- hosts: k8s_workers
  become: yes

  tasks:

    - name: Join Kubernetes cluster
      shell: "{{ hostvars[groups['k8s_master'][0]].kube_join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf
